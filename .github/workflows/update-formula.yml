name: update formula

on:
  workflow_dispatch:
    inputs:
      formula:
        description: Formula name to update, for example scut.
        required: true
        type: string
      version:
        description: Release version to package, for example v0.3.0.
        required: true
        type: string
  repository_dispatch:
    types:
      - update-formula

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-formula-${{ github.event.inputs.formula || github.event.client_payload.formula }}-${{ github.event.inputs.version || github.event.client_payload.version }}
  cancel-in-progress: false

jobs:
  update-formula:
    runs-on: ubuntu-22.04
    steps:
      - name: Resolve inputs
        id: inputs
        shell: bash
        run: |
          formula="${{ github.event.inputs.formula || github.event.client_payload.formula }}"
          version="${{ github.event.inputs.version || github.event.client_payload.version }}"

          if [[ -z "$formula" || -z "$version" ]]; then
            echo "formula and version are required" >&2
            exit 1
          fi

          safe_version="${version#v}"
          branch="update-${formula}-${safe_version}"

          {
            echo "formula=$formula"
            echo "version=$version"
            echo "branch=$branch"
          } >> "$GITHUB_OUTPUT"

      - name: Check out tap
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TAP_UPDATE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Create update branch
        run: git switch -c "${{ steps.inputs.outputs.branch }}"

      - name: Render formula
        run: |
          GO111MODULE=off go run ./.github/scripts/update-formula \
            -formula "${{ steps.inputs.outputs.formula }}" \
            -version "${{ steps.inputs.outputs.version }}"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.TAP_UPDATE_TOKEN || secrets.GITHUB_TOKEN }}
          FORMULA: ${{ steps.inputs.outputs.formula }}
          VERSION: ${{ steps.inputs.outputs.version }}
          BRANCH: ${{ steps.inputs.outputs.branch }}
        shell: bash
        run: |
          formula_path="Formula/${FORMULA}.rb"

          if git diff --quiet -- "$formula_path"; then
            echo "No formula changes for ${FORMULA} ${VERSION}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$formula_path"
          git commit -m "patch: update ${FORMULA} to ${VERSION}"
          git push --force-with-lease origin "$BRANCH"

          title="Update ${FORMULA} to ${VERSION}"
          body="$(cat <<BODY
          ## Summary
          - update \`${FORMULA}\` formula to \`${VERSION}\`
          - refresh release asset URLs and SHA-256 checksums

          ## Verification
          - generated by \`update formula\` workflow
          BODY
          )"

          existing_pr="$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')"
          if [[ -n "$existing_pr" ]]; then
            gh pr edit "$existing_pr" --title "$title" --body "$body"
            gh pr view "$existing_pr" --json url --jq '.url'
          else
            gh pr create --base main --head "$BRANCH" --title "$title" --body "$body"
          fi
